name: eazyconcepts
description: "EazyConcepts — Interactive learning for Class 6-10"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Local storage (offline-first)
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Math rendering (LaTeX equations)
  flutter_math_fork: ^0.7.2

  # Animations
  lottie: ^3.1.0
  rive: ^0.13.9

  # Markdown support for lesson text
  flutter_markdown: ^0.7.3

  # Network detection (online/offline)
  connectivity_plus: ^6.0.3

  # Utilities
  uuid: ^4.4.0
  intl: ^0.19.0
  shared_preferences: ^2.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0
  video_player: ^2.9.2
  lottie: ^3.1.2

flutter:
  uses-material-design: true


  assets:
    - assets/content/
    - assets/content/math/
    - assets/content/physics/
    - assets/tone/
    - assets/img/
    - assets/fonts/
#    - assets/images/icons/

  fonts:
    - family: Cinzel
      fonts:
        - asset: assets/fonts/Cinzel.ttf
    - family: CinzelDecorative
      fonts:
        - asset: assets/fonts/CinzelDecorative-Bold.ttf
    - family: InstrumentSans
      fonts:
        - asset: assets/fonts/InstrumentSans.ttf
    - family: ChivoMono
      fonts:
        - asset: assets/fonts/ChivoMono.ttf
    - family: RobotoMono
      fonts:
        - asset: assets/fonts/RobotoMono-Regular.ttf
          weight: 400